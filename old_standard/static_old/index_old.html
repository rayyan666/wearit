<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wearit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0deda;
    --text: #1a1916;
    --muted: #8a8782;
    --accent: #1a1916;
    --radius: 4px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    display: inline-block;
    margin-right: 8px;
    transition: background 0.3s;
  }
  .status-dot.ready { background: #4caf50; }
  .status-dot.loading { background: #ff9800; }
  .status-dot.error { background: #f44336; }

  .status-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  main {
    flex: 1;
    padding: 40px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .upload-area {
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .upload-area:hover { background: #eeecea; }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-area img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .upload-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }

  .upload-icon {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .upload-icon svg { stroke: var(--muted); }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .controls {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .seg-control {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .seg-control input { display: none; }

  .seg-control label {
    padding: 8px 0;
    text-align: center;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    color: var(--muted);
    border-right: 1px solid var(--border);
    transition: all 0.15s;
    margin: 0;
    letter-spacing: 0;
    text-transform: none;
  }

  .seg-control label:last-of-type { border-right: none; }

  .seg-control input:checked + label {
    background: var(--accent);
    color: white;
  }

  .overall-panel {
    display: none;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .overall-panel.visible { display: flex; }

  .overall-panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .overall-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 14px;
    align-items: center;
  }

  .mini-upload {
    width: 80px;
    height: 80px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: var(--surface);
    transition: background 0.15s;
  }

  .mini-upload:hover { background: #eeecea; }
  .mini-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .mini-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .mini-upload-hint {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    pointer-events: none;
    padding: 4px;
  }

  .overall-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.8;
  }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .size-grid input { display: none; }

  .size-grid label {
    padding: 7px 0;
    text-align: center;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    color: var(--muted);
    border-right: 1px solid var(--border);
    transition: all 0.15s;
  }

  .size-grid label:last-of-type { border-right: none; }
  .size-grid input:checked + label { background: var(--accent); color: white; }

  .range-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .range-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 28px;
    text-align: right;
  }

  .run-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-area {
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .result-area img { width: 100%; height: 100%; object-fit: cover; }

  .result-placeholder {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .processing .spinner { display: block; }
  .processing .result-placeholder { display: none; }

  .download-btn {
    display: none;
    padding: 10px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    text-align: center;
  }

  .download-btn:hover { background: var(--bg); }

  .result-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .error-msg {
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #f44336;
    padding: 10px 14px;
    background: #fff5f5;
    border: 1px solid #ffd0d0;
    border-radius: var(--radius);
  }
</style>
</head>
<body>

<header>
  <span class="wordmark">wearit</span>
  <span class="status-label">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">checking...</span>
  </span>
</header>

<main>
  <div class="grid">

    <div class="panel">
      <div class="panel-header">person</div>
      <div class="upload-area">
        <input type="file" accept="image/*" id="person-input">
        <div class="upload-placeholder" id="person-placeholder">
          <div class="upload-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
          </div>
          <span class="upload-hint">upload photo</span>
        </div>
        <img id="person-preview" style="display:none">
      </div>
    </div>

    <div class="panel">
      <div class="panel-header" id="garment-header">garment</div>
      <div class="upload-area">
        <input type="file" accept="image/*" id="garment-input">
        <div class="upload-placeholder" id="garment-placeholder">
          <div class="upload-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
          </div>
          <span class="upload-hint" id="garment-hint">upload garment</span>
        </div>
        <img id="garment-preview" style="display:none">
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">result</div>
      <div class="result-area" id="result-area">
        <div class="spinner" id="spinner"></div>
        <div class="result-placeholder" id="result-placeholder">result appears<br>here</div>
        <img id="result-img" style="display:none">
      </div>
      <div class="result-footer">
        <a class="download-btn" id="download-btn" download="wearit-result.png">download</a>
      </div>
    </div>

  </div>

  <div class="panel">
    <div class="controls">

      <div class="field">
        <label>category</label>
        <div class="seg-control">
          <input type="radio" name="category" id="cat-upper" value="upper" checked>
          <label for="cat-upper">upper</label>
          <input type="radio" name="category" id="cat-lower" value="lower">
          <label for="cat-lower">lower</label>
          <input type="radio" name="category" id="cat-overall" value="overall">
          <label for="cat-overall">overall</label>
        </div>
      </div>

      <div class="overall-panel" id="overall-panel">
        <div class="overall-panel-label">overall mode</div>
        <div class="overall-row">
          <div class="mini-upload">
            <input type="file" accept="image/*" id="lower-input">
            <img id="lower-preview" style="display:none">
            <span class="mini-upload-hint" id="lower-hint">+ lower<br>garment<br>(optional)</span>
          </div>
          <div class="overall-note">
            Upper garment is taken from the panel above.<br><br>
            If no lower garment is added here, the original lower body from the person photo is preserved.
          </div>
        </div>
      </div>

      <div class="field">
        <label>clothing size</label>
        <div class="size-grid">
          <input type="radio" name="size" id="sz-xs" value="XS"><label for="sz-xs">XS</label>
          <input type="radio" name="size" id="sz-s" value="S"><label for="sz-s">S</label>
          <input type="radio" name="size" id="sz-m" value="M" checked><label for="sz-m">M</label>
          <input type="radio" name="size" id="sz-l" value="L"><label for="sz-l">L</label>
          <input type="radio" name="size" id="sz-xl" value="XL"><label for="sz-xl">XL</label>
          <input type="radio" name="size" id="sz-xxl" value="XXL"><label for="sz-xxl">XXL</label>
        </div>
      </div>

      <div class="field">
        <label>steps</label>
        <div class="range-wrap">
          <input type="range" id="steps" min="5" max="50" value="20">
          <span class="range-val" id="steps-val">20</span>
        </div>
      </div>

      <button class="run-btn" id="run-btn" disabled>run try-on</button>
      <div class="error-msg" id="error-msg"></div>

    </div>
  </div>
</main>

<script>
  const API = '';
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) { dot.className = 'status-dot ready'; statusText.textContent = 'ready'; }
      else throw new Error();
    } catch {
      dot.className = 'status-dot error';
      statusText.textContent = 'offline';
    }
  }
  checkHealth();

  function setupUpload(inputId, previewId, placeholderId, onChange) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    const placeholder = placeholderId ? document.getElementById(placeholderId) : null;
    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      if (placeholder) placeholder.style.display = 'none';
      if (onChange) onChange();
    });
  }

  setupUpload('person-input', 'person-preview', 'person-placeholder', checkReady);
  setupUpload('garment-input', 'garment-preview', 'garment-placeholder', checkReady);

  const lowerInput = document.getElementById('lower-input');
  const lowerPreview = document.getElementById('lower-preview');
  const lowerHint = document.getElementById('lower-hint');
  lowerInput.addEventListener('change', () => {
    const file = lowerInput.files[0];
    if (!file) return;
    lowerPreview.src = URL.createObjectURL(file);
    lowerPreview.style.display = 'block';
    lowerHint.style.display = 'none';
  });

  const overallPanel = document.getElementById('overall-panel');
  const garmentHeader = document.getElementById('garment-header');
  const garmentHint = document.getElementById('garment-hint');

  document.querySelectorAll('input[name="category"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const val = document.querySelector('input[name="category"]:checked').value;
      if (val === 'overall') {
        overallPanel.classList.add('visible');
        garmentHeader.textContent = 'upper garment';
        garmentHint.textContent = 'upload upper garment';
      } else {
        overallPanel.classList.remove('visible');
        garmentHeader.textContent = 'garment';
        garmentHint.textContent = 'upload garment';
      }
    });
  });

  const stepsInput = document.getElementById('steps');
  const stepsVal = document.getElementById('steps-val');
  stepsInput.addEventListener('input', () => { stepsVal.textContent = stepsInput.value; });

  const runBtn = document.getElementById('run-btn');
  function checkReady() {
    const hasPerson = !!document.getElementById('person-input').files[0];
    const hasGarment = !!document.getElementById('garment-input').files[0];
    runBtn.disabled = !(hasPerson && hasGarment);
  }

  const resultArea = document.getElementById('result-area');
  const resultImg = document.getElementById('result-img');
  const downloadBtn = document.getElementById('download-btn');
  const errorMsg = document.getElementById('error-msg');

  runBtn.addEventListener('click', async () => {
    errorMsg.style.display = 'none';
    resultImg.style.display = 'none';
    downloadBtn.style.display = 'none';
    resultArea.classList.add('processing');
    runBtn.disabled = true;
    dot.className = 'status-dot loading';
    statusText.textContent = 'processing...';

    const category = document.querySelector('input[name="category"]:checked').value;
    const size = document.querySelector('input[name="size"]:checked').value;

    const form = new FormData();
    form.append('person', document.getElementById('person-input').files[0]);
    form.append('garment', document.getElementById('garment-input').files[0]);
    form.append('category', category);
    form.append('steps', stepsInput.value);
    form.append('size', size);

    if (category === 'overall' && lowerInput.files[0]) {
      form.append('lower_garment', lowerInput.files[0]);
    }

    try {
      const r = await fetch(`${API}/tryon`, { method: 'POST', body: form });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'server error');
      resultImg.src = data.image;
      resultImg.style.display = 'block';
      downloadBtn.href = data.image;
      downloadBtn.style.display = 'block';
      dot.className = 'status-dot ready';
      statusText.textContent = 'ready';
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      dot.className = 'status-dot error';
      statusText.textContent = 'error';
    } finally {
      resultArea.classList.remove('processing');
      runBtn.disabled = false;
    }
  });
</script>
</body>
</html>
